[platformio]
default_envs = c8_serial
src_dir = src

# The project targets one board and one upload path: STM32F103C8 via its ROM
# UART bootloader through FT232.  Keeping one environment avoids accidentally
# building the removed legacy firmware or a board with a different RAM size.
[env:c8_serial]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
build_type = release
monitor_speed = 1000000
upload_protocol = serial
upload_speed = 115200
build_unflags =
  -Os
build_src_filter =
  -<*>
  +<firmware/main.cpp>
  +<firmware/la_board.c>
  +<firmware/la_capture.c>
  +<firmware/la_protocol.c>
  +<firmware/la_benchmark.c>
build_flags =
  -DLA_FIRMWARE_BUILD_ONLY
  -DHAL_TIM_MODULE_ONLY
  -O2
  -flto
  -DNDEBUG
  -DLA_ENABLE_DWT_BENCHMARK=0
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections

# Benchmark-only image: unlocks the DMA rate command so hardware-in-the-loop
# tests can discover the real ceiling. The normal c8_serial image remains
# capped at the HIL-verified 5.818181 MS/s rate.
[env:c8_serial_benchmark]
extends = env:c8_serial
build_flags =
  ${env:c8_serial.build_flags}
  -DLA_MAX_SAMPLE_RATE_HZ_TARGET=32000000UL
  -DLA_FIRMWARE_VERSION=\"SLA8-FW-V2-RATE-BENCH\"
