[platformio]
default_envs = genericSTM32F103C8_serial
src_dir = src

[env]
platform = ststm32
framework = arduino
monitor_speed = 1000000
build_src_filter =
  -<*>
  +<firmware/main.cpp>
  +<firmware/la_*.c>
build_flags =
  -DLA_FIRMWARE_BUILD_ONLY
  -DHAL_TIM_MODULE_ONLY
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections

[common_f103c8_release]
board = genericSTM32F103C8
build_type = release
build_flags =
  ${env.build_flags}
  -O3
  -DNDEBUG
  -DLA_ENABLE_DWT_BENCHMARK=0

[common_f103c8_debug]
board = genericSTM32F103C8
build_type = debug
build_flags =
  ${env.build_flags}
  -O0
  -g3
  -DLA_ENABLE_DWT_BENCHMARK=1

[common_f103c6_release]
board = bluepill_f103c6
build_type = release
build_flags =
  ${env.build_flags}
  -O2
  -DNDEBUG
  -DLA_ENABLE_DWT_BENCHMARK=0
  -Wl,--defsym,_Min_Heap_Size=0x80
  -Wl,--defsym,_Min_Stack_Size=0x80

[common_c8_v2]
board = genericSTM32F103C8
build_type = release
build_src_filter =
  -<*>
  +<firmware_v2/main.cpp>
  +<firmware_v2/la_board.c>
  +<firmware_v2/la_capture.c>
  +<firmware_v2/la_protocol.c>
  +<firmware_v2/la_benchmark.c>
build_flags =
  ${env.build_flags}
  -O2
  -flto
  -DNDEBUG
  -DLA_ENABLE_DWT_BENCHMARK=0

[env:genericSTM32F103C8_release]
board = ${common_f103c8_release.board}
build_type = ${common_f103c8_release.build_type}
build_flags = ${common_f103c8_release.build_flags}

[env:genericSTM32F103C8_serial]
board = ${common_f103c8_release.board}
build_type = ${common_f103c8_release.build_type}
build_flags = ${common_f103c8_release.build_flags}
upload_protocol = serial
upload_speed = 115200

[env:genericSTM32F103C8_stlink]
board = ${common_f103c8_release.board}
build_type = ${common_f103c8_release.build_type}
build_flags = ${common_f103c8_release.build_flags}
upload_protocol = stlink

[env:genericSTM32F103C8_debug]
board = ${common_f103c8_debug.board}
build_type = ${common_f103c8_debug.build_type}
build_flags = ${common_f103c8_debug.build_flags}

[env:bluepill_f103c6_serial]
board = ${common_f103c6_release.board}
build_type = ${common_f103c6_release.build_type}
build_flags = ${common_f103c6_release.build_flags}
upload_protocol = serial
upload_port = COM12
upload_speed = 115200

[env:c8_v2_serial]
board = ${common_c8_v2.board}
build_type = ${common_c8_v2.build_type}
build_src_filter = ${common_c8_v2.build_src_filter}
build_flags = ${common_c8_v2.build_flags}
upload_protocol = serial
upload_speed = 115200

[env:c8_v2_stlink]
board = ${common_c8_v2.board}
build_type = ${common_c8_v2.build_type}
build_src_filter = ${common_c8_v2.build_src_filter}
build_flags = ${common_c8_v2.build_flags}
upload_protocol = stlink

[env:bluepill_f103c6_stlink]
board = ${common_f103c6_release.board}
build_type = ${common_f103c6_release.build_type}
build_flags = ${common_f103c6_release.build_flags}
upload_protocol = stlink

[env:nucleo_f401re]
board = nucleo_f401re
build_type = release
build_flags =
  ${env.build_flags}
  -O3
  -DNDEBUG
  -DLA_ENABLE_DWT_BENCHMARK=0

[env:blackpill_f401cc]
board = blackpill_f401cc
build_type = release
build_flags =
  ${env.build_flags}
  -O3
  -DNDEBUG
  -DLA_ENABLE_DWT_BENCHMARK=0

[env:blackpill_f411ce]
board = blackpill_f411ce
build_type = release
build_flags =
  ${env.build_flags}
  -O3
  -DNDEBUG
  -DLA_ENABLE_DWT_BENCHMARK=0
